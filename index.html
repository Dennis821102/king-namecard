    const btnShare = document.getElementById('btnShare');
    const statusEl = document.getElementById('status');

    function setStatus(msg, type) {
      statusEl.textContent = msg;
      statusEl.className = 'status' + (type ? ' ' + type : '');
    }

    async function initLiff() {
      try {
        if (!LIFF_ID || LIFF_ID.includes('YOUR_LIFF')) {
          setStatus('請先設定 LIFF ID（見下方教學）', 'error');
          btnShare.textContent = '尚未設定 LIFF ID';
          return;
        }

        setStatus('正在初始化 LIFF...');
        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          setStatus('正在導向 LINE 登入...');
          liff.login();
          return;
        }

        if (!liff.isApiAvailable('shareTargetPicker')) {
          setStatus('此環境不支援分享功能，請在 LINE App 內開啟此頁面', 'error');
          return;
        }

        btnShare.disabled = false;
        btnShare.textContent = '分享名片給好友';
        setStatus('已登入，點擊按鈕選擇分享對象');
      } catch (err) {
        setStatus('LIFF 初始化失敗: ' + err.message, 'error');
      }
    }

    btnShare.addEventListener('click', async () => {
      try {
        btnShare.disabled = true;
        btnShare.textContent = '傳送中...';
        setStatus('正在開啟分享選擇...');

        const result = await liff.shareTargetPicker([flexMessage]);

        if (result) {
          setStatus('名片已成功傳送！', 'success');
          btnShare.textContent = '再分享一次';
        } else {
          setStatus('已取消分享');
          btnShare.textContent = '分享名片給好友';
        }
      } catch (err) {
        setStatus('傳送失敗: ' + err.message, 'error');
        btnShare.textContent = '重新分享';
      } finally {
        btnShare.disabled = false;
      }
    });

    initLiff();
